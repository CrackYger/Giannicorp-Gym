name: Build iOS App (unsigned)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Install Capacitor toolchain
        run: |
          npm i -D @capacitor/cli@^6 @capacitor/ios@^6
          npm i @capacitor/core@^6

      - name: Build web (Vite via Node)
        run: node ./node_modules/vite/bin/vite.js build

      - name: Capacitor doctor
        run: node node_modules/@capacitor/cli/bin/capacitor doctor || true

      - name: Add iOS platform
        run: |
          if [ -d ios ]; then
            echo "iOS platform already present"
          else
            node node_modules/@capacitor/cli/bin/capacitor add ios
          fi

      - name: Sync iOS
        run: node node_modules/@capacitor/cli/bin/capacitor sync ios

      - name: CocoaPods install
        run: |
          cd ios/App
          pod install

      - name: Xcode archive (unsigned)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive archive \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      # <<<<<<<< WICHTIG: .ipa manuell packen (kein Signing nötig) >>>>>>>>
      - name: Create unsigned .ipa manually
        run: |
          rm -rf build/ipa
          mkdir -p build/ipa/Payload
          cp -R "build/App.xcarchive/Products/Applications/App.app" build/ipa/Payload/
          (cd build/ipa && zip -r giannicorp-fitness-unsigned.ipa Payload >/dev/null)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: giannicorp-fitness-ipa
          path: build/ipa/*.ipa
