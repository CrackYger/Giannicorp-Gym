name: Build iOS App (unsigned)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Install Capacitor toolchain
        run: |
          npm i -D @capacitor/cli@^6 @capacitor/ios@^6
          npm i @capacitor/core@^6

      - name: Build web (Vite via Node)
        run: node ./node_modules/vite/bin/vite.js build

      # 🚀 Falls noch kein capacitor.config.ts existiert, wird er hier erzeugt
      - name: Create capacitor.config.ts if missing
        run: |
          if [ ! -f capacitor.config.ts ]; then
            cat > capacitor.config.ts <<'TS'
            import type { CapacitorConfig } from '@capacitor/cli';

            const config: CapacitorConfig = {
              appId: 'com.giannicorp.fitness',
              appName: 'GianniCorpFitness',
              webDir: 'dist'
            };

            export default config;
            TS
            echo "capacitor.config.ts created."
          else
            echo "capacitor.config.ts already present."
          fi

      - name: Capacitor doctor
        run: node node_modules/@capacitor/cli/bin/capacitor doctor || true

      - name: Add iOS platform
        run: |
          if [ -d ios ]; then
            echo "iOS platform already present"
          else
            node node_modules/@capacitor/cli/bin/capacitor add ios
          fi

      - name: Sync iOS
        run: node node_modules/@capacitor/cli/bin/capacitor sync ios

      - name: CocoaPods install
        run: |
          cd ios/App
          pod install

      - name: Create exportOptions.plist
        run: |
          cat > ios/App/exportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>development</string>
            <key>signingStyle</key><string>manual</string>
            <key>compileBitcode</key><false/>
            <key>manageAppVersionAndBuildNumber</key><false/>
          </dict>
          </plist>
          PLIST

      - name: Xcode archive (unsigned)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive archive \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Package .ipa (unsigned)
        run: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ios/App/exportOptions.plist \
            -exportPath build/ipa \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: giannicorp-fitness-ipa
          path: build/ipa
